<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgDark" x1="6" y1="4" x2="34" y2="36" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#254050"/>
            <stop offset="1" stop-color="#305060"/>
        </linearGradient>
        <linearGradient id="sweepDark" x1="5" y1="30" x2="35" y2="10" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#22D3EE" stop-opacity="0.00"/>
            <stop offset="0.30" stop-color="#22D3EE" stop-opacity="0.20"/>
            <stop offset="0.60" stop-color="#34D399" stop-opacity="0.15"/>
            <stop offset="1" stop-color="#34D399" stop-opacity="0.00"/>
        </linearGradient>
        <linearGradient id="lockSpectrumDark" x1="11" y1="6" x2="29" y2="35" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#22D3EE"/>
            <stop offset="0.45" stop-color="#2DD4BF"/>
            <stop offset="1" stop-color="#34D399"/>
        </linearGradient>
        <linearGradient id="lockSheenDark" x1="13" y1="7" x2="27" y2="34" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
            <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
        </linearGradient>
        <clipPath id="tileClipDark">
            <rect x="2" y="2" width="36" height="36" rx="8"/>
        </clipPath>
    </defs>

    <!-- Rounded square tile -->
    <rect x="2" y="2" width="36" height="36" rx="8" fill="url(#bgDark)"/>
    <rect x="2" y="2" width="36" height="36" rx="8" fill="url(#sweepDark)"/>

    <!-- Road lane (clipped to tile) -->
    <g clip-path="url(#tileClipDark)" opacity="0.28">
        <rect x="5" y="2" width="1" height="36" fill="url(#lockSpectrumDark)"/>
        <rect x="34" y="2" width="1" height="36" fill="url(#lockSpectrumDark)"/>
        <!-- Dashed center line -->
        <rect x="19.5" y="2" width="1" height="3" rx="0.5" fill="url(#lockSpectrumDark)"/>
        <rect x="19.5" y="7" width="1" height="3" rx="0.5" fill="url(#lockSpectrumDark)"/>
        <rect x="19.5" y="12" width="1" height="3" rx="0.5" fill="url(#lockSpectrumDark)"/>
        <rect x="19.5" y="17" width="1" height="3" rx="0.5" fill="url(#lockSpectrumDark)"/>
        <rect x="19.5" y="22" width="1" height="3" rx="0.5" fill="url(#lockSpectrumDark)"/>
        <rect x="19.5" y="27" width="1" height="3" rx="0.5" fill="url(#lockSpectrumDark)"/>
        <rect x="19.5" y="32" width="1" height="3" rx="0.5" fill="url(#lockSpectrumDark)"/>
        <rect x="19.5" y="37" width="1" height="3" rx="0.5" fill="url(#lockSpectrumDark)"/>
    </g>

    <!-- Padlock (larger) -->
    <g fill="url(#lockSpectrumDark)">
        <path d="M 13.5 19 V 13.5 C 13.5 8 16 6 20 6 C 24 6 26.5 8 26.5 13.5 V 19 L 23.2 19 V 13.5 C 23.2 10.2 22 9 20 9 C 18 9 16.8 10.2 16.8 13.5 V 19 Z" fill-rule="evenodd"/>
        <rect x="10.5" y="18.5" width="19" height="15" rx="3"/>
    </g>
    <g fill="url(#lockSheenDark)">
        <path d="M 13.5 19 V 13.5 C 13.5 8 16 6 20 6 C 24 6 26.5 8 26.5 13.5 V 19 L 23.2 19 V 13.5 C 23.2 10.2 22 9 20 9 C 18 9 16.8 10.2 16.8 13.5 V 19 Z" fill-rule="evenodd"/>
        <rect x="10.5" y="18.5" width="19" height="15" rx="3"/>
    </g>

    <!-- Keyhole -->
    <g opacity="0.50">
        <circle cx="20" cy="25.5" r="1.8" fill="#254050"/>
        <rect x="19.2" y="25.5" width="1.6" height="3.4" rx="0.8" fill="#254050"/>
    </g>
</svg>
